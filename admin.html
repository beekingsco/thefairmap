<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — TheFairMap</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/data/icons/fairmap-icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #111827; font-size: 14px; }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .layout { display: flex; flex-direction: column; height: 100vh; }

    /* ── Top bar ───────────────────────────────────────────────────────── */
    .topbar {
      height: 48px; display: flex; align-items: center; padding: 0 16px;
      background: #fff; border-bottom: 1px solid #e5e7eb; z-index: 100; flex-shrink: 0;
    }
    .topbar-brand { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .topbar-section { flex: 1; text-align: center; font-weight: 600; font-size: 14px; color: #374151; }
    .topbar-right { display: flex; align-items: center; gap: 12px; font-size: 13px; }
    .topbar-right a { color: #00b8a9; text-decoration: none; font-weight: 600; }
    .topbar-right a:hover { text-decoration: underline; }
    .topbar-user { color: #6b7280; }
    .btn-signout {
      background: #f3f4f6; border: 1px solid #d1d5db; color: #374151;
      padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .btn-signout:hover { background: #e5e7eb; }

    /* ── Main area: sidebar + center + map ─────────────────────────── */
    .main-area { display: flex; flex: 1; overflow: hidden; }

    /* ── Left sidebar ──────────────────────────────────────────────── */
    .sidebar {
      width: 56px; background: #1a1f2e; display: flex; flex-direction: column;
      align-items: center; padding-top: 8px; flex-shrink: 0;
    }
    .sidebar-item {
      width: 48px; height: 52px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      cursor: pointer; color: #9ca3af; font-size: 18px; border-radius: 0;
      border-left: 3px solid transparent; transition: all 0.15s;
      text-decoration: none; margin-bottom: 2px;
    }
    .sidebar-item span { font-size: 9px; font-weight: 600; letter-spacing: 0.02em; }
    .sidebar-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .sidebar-item.active {
      color: #fff; border-left-color: #00b8a9; background: rgba(0,184,169,0.15);
    }

    /* ── Center panel ──────────────────────────────────────────────── */
    .center-panel {
      width: 360px; border-right: 1px solid #e5e7eb; background: #fff;
      overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column;
    }
    .panel-content { flex: 1; padding: 16px; }

    /* ── Right map pane ────────────────────────────────────────────── */
    .map-pane { flex: 1; position: relative; }
    #admin-map { width: 100%; height: 100%; }

    /* ── Action bar (top of center panel) ──────────────────────────── */
    .action-bar { padding: 12px 16px; border-bottom: 1px solid #e5e7eb; }
    .btn-new {
      background: #00b8a9; color: #fff; border: none; padding: 8px 16px;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit; width: 100%; margin-bottom: 8px;
    }
    .btn-new:hover { background: #00a89a; }
    .filter-row { display: flex; gap: 6px; }
    .filter-row input, .filter-row select {
      flex: 1; padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 12px; font-family: inherit; background: #fff;
    }
    .filter-row input:focus, .filter-row select:focus { outline: none; border-color: #00b8a9; }

    /* ── Location list ─────────────────────────────────────────────── */
    .loc-list { flex: 1; overflow-y: auto; }
    .loc-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 16px;
      border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background 0.1s;
    }
    .loc-row:hover { background: #f9fafb; }
    .loc-row.selected { background: #f0fdfb; border-left: 3px solid #00b8a9; }
    .loc-row input[type="checkbox"] { flex-shrink: 0; }
    .loc-info { flex: 1; min-width: 0; }
    .loc-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .loc-addr { font-size: 11px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .pagination {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px; font-size: 12px; color: #6b7280; border-top: 1px solid #e5e7eb;
    }
    .pagination button {
      background: #f3f4f6; border: 1px solid #d1d5db; color: #374151;
      padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; font-family: inherit;
    }
    .pagination button:disabled { opacity: 0.4; cursor: default; }

    /* ── Location editor ───────────────────────────────────────────── */
    .editor { display: flex; flex-direction: column; height: 100%; }
    .editor-scroll { flex: 1; overflow-y: auto; padding: 16px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: #00b8a9; text-decoration: none; font-size: 13px; font-weight: 600;
      margin-bottom: 12px; cursor: pointer;
    }
    .back-link:hover { text-decoration: underline; }
    .editor label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; margin-top: 12px; }
    .editor input[type="text"],
    .editor input[type="url"],
    .editor input[type="number"],
    .editor select {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;
      font-size: 13px; font-family: inherit;
    }
    .editor input:focus, .editor select:focus { outline: none; border-color: #00b8a9; }
    .editor-name-input { font-size: 18px !important; font-weight: 700; padding: 10px !important; }

    /* Rich text toolbar */
    .rt-toolbar {
      display: flex; gap: 2px; padding: 4px; border: 1px solid #d1d5db;
      border-bottom: none; border-radius: 6px 6px 0 0; background: #f9fafb;
    }
    .rt-toolbar button {
      background: none; border: 1px solid transparent; border-radius: 4px;
      padding: 4px 8px; cursor: pointer; font-size: 13px; font-family: inherit; color: #374151;
    }
    .rt-toolbar button:hover { background: #e5e7eb; }
    .rt-editable {
      min-height: 80px; padding: 10px; border: 1px solid #d1d5db; border-radius: 0 0 6px 6px;
      font-size: 13px; font-family: inherit; outline: none; line-height: 1.5;
    }
    .rt-editable:focus { border-color: #00b8a9; }

    /* Accordion sections */
    .accordion { border: 1px solid #e5e7eb; border-radius: 6px; margin-top: 12px; overflow: hidden; }
    .accordion-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; background: #f9fafb; cursor: pointer; font-size: 13px; font-weight: 600;
      user-select: none;
    }
    .accordion-header:hover { background: #f3f4f6; }
    .accordion-header .chevron { transition: transform 0.2s; font-size: 11px; color: #6b7280; }
    .accordion.open .chevron { transform: rotate(90deg); }
    .accordion-body { padding: 12px; display: none; border-top: 1px solid #e5e7eb; }
    .accordion.open .accordion-body { display: block; }

    /* Image drop zone */
    .drop-zone {
      border: 2px dashed #d1d5db; border-radius: 8px; padding: 20px;
      text-align: center; color: #6b7280; font-size: 12px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: #00b8a9; background: #f0fdfb; }
    .drop-zone img { max-width: 100%; max-height: 120px; border-radius: 6px; margin-top: 8px; }

    /* Click-to-set button */
    .btn-click-map {
      background: #f3f4f6; border: 1px solid #d1d5db; color: #374151;
      padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-top: 8px;
    }
    .btn-click-map.active { background: #00b8a9; color: #fff; border-color: #00b8a9; }

    /* Editor bottom bar */
    .editor-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid #e5e7eb; background: #fff; flex-shrink: 0;
    }
    .btn-delete {
      background: #ef4444; color: #fff; border: none; padding: 8px 16px;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-delete:hover { background: #dc2626; }
    .btn-save {
      background: #00b8a9; color: #fff; border: none; padding: 8px 20px;
      border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-save:hover { background: #00a89a; }

    /* ── Categories panel ──────────────────────────────────────────── */
    .cat-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .cat-swatch { width: 20px; height: 20px; border-radius: 4px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.1); }
    .cat-name { flex: 1; font-size: 13px; font-weight: 600; }
    .cat-count { font-size: 11px; color: #6b7280; background: #f3f4f6; padding: 2px 8px; border-radius: 10px; }
    .cat-actions { display: flex; gap: 4px; }
    .btn-sm {
      padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; border: 1px solid #d1d5db;
      background: #f3f4f6; color: #374151;
    }
    .btn-sm:hover { background: #e5e7eb; }
    .btn-sm.danger { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
    .btn-sm.danger:hover { background: #fee2e2; }
    .cat-edit-row { display: flex; gap: 6px; align-items: center; padding: 8px 0; }
    .cat-edit-row input[type="text"] {
      flex: 1; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .cat-edit-row input[type="color"] { width: 32px; height: 32px; border: none; cursor: pointer; border-radius: 4px; }
    .add-cat-form {
      display: flex; gap: 6px; align-items: center; padding: 12px 0;
      border-top: 1px solid #e5e7eb; margin-top: 8px;
    }
    .add-cat-form input[type="text"] {
      flex: 1; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .add-cat-form input[type="color"] { width: 32px; height: 32px; border: none; cursor: pointer; border-radius: 4px; }
    .btn-primary-sm {
      background: #00b8a9; color: #fff; border: none; padding: 6px 12px;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-primary-sm:hover { background: #00a89a; }

    /* ── Import panel ──────────────────────────────────────────────── */
    .import-section { margin-bottom: 20px; }
    .import-section h3 { font-size: 14px; margin-bottom: 8px; }
    .import-section p { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    .btn-export {
      background: #f3f4f6; border: 1px solid #d1d5db; color: #374151;
      padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; width: 100%;
    }
    .btn-export:hover { background: #e5e7eb; }
    .import-file { width: 100%; margin-bottom: 8px; }
    .merge-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; font-size: 13px; }
    .csv-area {
      width: 100%; height: 120px; padding: 8px; border: 1px solid #d1d5db;
      border-radius: 6px; font-size: 12px; font-family: monospace; resize: vertical;
    }
    .csv-help { font-size: 11px; color: #6b7280; margin-top: 4px; }

    /* ── Settings panel ────────────────────────────────────────────── */
    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .stat-card {
      padding: 16px; border: 1px solid #e5e7eb; border-radius: 8px; text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: 700; color: #00b8a9; }
    .stat-label { font-size: 11px; color: #6b7280; font-weight: 600; margin-top: 2px; text-transform: uppercase; }

    /* ── Admin panel ───────────────────────────────────────────────── */
    .admin-card {
      border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px; margin-bottom: 16px;
    }
    .admin-card h3 { font-size: 14px; margin-bottom: 12px; }
    .approval-row, .claim-row {
      display: flex; align-items: center; gap: 8px; padding: 8px 0;
      border-bottom: 1px solid #f3f4f6; font-size: 13px;
    }
    .approval-row:last-child, .claim-row:last-child { border-bottom: none; }
    .approval-info, .claim-info { flex: 1; }
    .approval-name, .claim-name { font-weight: 600; }
    .approval-meta, .claim-meta { font-size: 11px; color: #6b7280; }
    .btn-approve {
      background: #00b8a9; color: #fff; border: none; padding: 4px 10px;
      border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-reject {
      background: #ef4444; color: #fff; border: none; padding: 4px 10px;
      border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .user-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #6b7280;
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-meta { font-size: 11px; color: #6b7280; }
    .add-user-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .add-user-form input, .add-user-form select {
      padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .change-pw-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .change-pw-form input {
      padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: inherit;
    }

    /* ── Toast ──────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1f2e; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 13px; font-weight: 600; z-index: 9999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2); animation: toastIn 0.2s ease;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

    /* ── Pulsing marker ────────────────────────────────────────────── */
    .pulse-marker {
      width: 20px; height: 20px; border-radius: 50%; position: relative;
    }
    .pulse-marker::after {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 3px solid #00b8a9; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.4; } }

    /* ── Auth wall ─────────────────────────────────────────────────── */
    .auth-wall {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; color: #6b7280;
    }

    /* ── Modal ──────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px; padding: 24px; width: 480px;
      max-width: 90vw; max-height: 80vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-box h3 { margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    .center-panel::-webkit-scrollbar, .loc-list::-webkit-scrollbar, .editor-scroll::-webkit-scrollbar { width: 4px; }
    .center-panel::-webkit-scrollbar-thumb, .loc-list::-webkit-scrollbar-thumb, .editor-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

    /* ── Bulk bar ──────────────────────────────────────────────────── */
    .bulk-bar {
      display: none; align-items: center; gap: 8px; padding: 8px 16px;
      background: #fef3c7; border-bottom: 1px solid #fcd34d; font-size: 12px;
    }
    .bulk-bar.visible { display: flex; }
  </style>
</head>
<body>

  <!-- Auth wall -->
  <div class="auth-wall" id="auth-wall">Checking authentication...</div>

  <!-- Main layout (hidden until authed) -->
  <div class="layout" id="app-layout" style="display:none;">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-brand">&#x1f5fa;&#xfe0f; TheFairMap</div>
      <div class="topbar-section" id="topbar-section">Locations</div>
      <div class="topbar-right">
        <a id="view-map-link" href="/" target="_blank">View Map</a>
        <span class="topbar-user" id="topbar-user">admin</span>
        <button class="btn-signout" id="btn-signout">Sign Out</button>
      </div>
    </div>

    <div class="main-area">
      <!-- Left sidebar -->
      <div class="sidebar">
        <div class="sidebar-item" data-section="home">&#x1f3e0;<span>Home</span></div>
        <div class="sidebar-item active" data-section="locations">&#x1f4cd;<span>Locations</span></div>
        <div class="sidebar-item" data-section="categories">&#x1f3f7;&#xfe0f;<span>Categories</span></div>
        <div class="sidebar-item" data-section="import">&#x2b06;&#xfe0f;<span>Import</span></div>
        <div class="sidebar-item" data-section="settings">&#x2699;&#xfe0f;<span>Settings</span></div>
        <div class="sidebar-item" data-section="admin">&#x1f464;<span>Admin</span></div>
      </div>

      <!-- Center panel -->
      <div class="center-panel" id="center-panel">
        <!-- Content injected by JS -->
      </div>

      <!-- Right map pane -->
      <div class="map-pane">
        <div id="admin-map"></div>
      </div>
    </div>
  </div>

  <!-- Review modal -->
  <div class="modal-overlay" id="review-modal">
    <div class="modal-box">
      <h3 id="review-modal-title">Review</h3>
      <div id="review-modal-body"></div>
      <div style="margin-top:12px;">
        <label style="font-size:12px;font-weight:600;color:#374151;">Note (optional)</label>
        <textarea id="review-note" rows="2" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:inherit;margin-top:4px;" placeholder="Reason for rejection (if rejecting)"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-sm" id="btn-review-cancel">Cancel</button>
        <button class="btn-reject" id="btn-review-reject">Reject</button>
        <button class="btn-approve" id="btn-review-approve" style="padding:6px 16px;">Approve</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
