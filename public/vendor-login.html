<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — TheFairMap</title>
  <link rel="icon" type="image/png" sizes="192x192" href="/data/icons/fairmap-icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 40px; width: 400px; max-width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; text-align: center; }
    .subtitle { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
    .btn { width: 100%; padding: 12px; background: #1a1f2e; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .btn:hover { background: #2d3548; }
    .btn.green { background: #10b981; }
    .btn.green:hover { background: #059669; }
    .error { color: #ef4444; font-size: 13px; margin-bottom: 12px; display: none; text-align: center; }
    .divider { text-align: center; margin: 20px 0; font-size: 12px; color: #9ca3af; }
    .links { text-align: center; margin-top: 16px; font-size: 13px; }
    .links a { color: #10b981; font-weight: 600; text-decoration: none; }
    .links a:hover { text-decoration: underline; }
    .tab-row { display: flex; margin-bottom: 24px; border: 1px solid #e5e7eb; border-radius: 8px; overflow: hidden; }
    .tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; background: #f9fafb; color: #6b7280; border: none; font-family: inherit; }
    .tab.active { background: #1a1f2e; color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="page-title">Log In</h1>
    <p class="subtitle" id="page-subtitle">Vendor or Map Owner</p>

    <div class="tab-row">
      <button class="tab active" id="tab-vendor" onclick="switchTab('vendor')">Vendor</button>
      <button class="tab" id="tab-admin" onclick="switchTab('admin')">Map Owner</button>
    </div>

    <div class="error" id="error"></div>
    <form id="login-form">
      <div id="tenant-field" style="display:none;">
        <label>Your Event / Fair Slug</label>
        <input type="text" id="tenant-input" placeholder="e.g. firstmonday" autocomplete="off">
      </div>
      <label>Email</label>
      <input type="email" id="email" required placeholder="you@example.com">
      <label>Password</label>
      <input type="password" id="password" required placeholder="Your password">
      <button type="submit" class="btn">Log In</button>
    </form>

    <div class="links">
      <a href="/vendors/claim">Don't have an account? Claim your listing &rarr;</a>
    </div>
    <div class="links" style="margin-top:8px;">
      <a href="/">&larr; Back to map</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    // Auto-detect tenant from subdomain (e.g. firstmonday.thefairmap.com)
    // or fall back to ?tenant= query param
    function detectTenant() {
      const qTenant = params.get('tenant');
      if (qTenant) return qTenant;
      const host = window.location.hostname;
      // If it's a subdomain of thefairmap.com that isn't 'map' or 'www'
      const match = host.match(/^([^.]+)\.thefairmap\.com$/);
      if (match && match[1] !== 'map' && match[1] !== 'www') return match[1];
      return null;
    }

    const tenantSlug = detectTenant();
    const tp = tenantSlug ? '?tenant=' + encodeURIComponent(tenantSlug) : '';

    // Show tenant name in subtitle if we have one, or show the slug input
    if (tenantSlug) {
      document.getElementById('page-subtitle').textContent =
        tenantSlug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) + ' — Vendor or Map Owner';
    } else {
      // No tenant in URL — show the slug field so they can enter it
      document.getElementById('tenant-field').style.display = 'block';
    }

    let mode = 'vendor';

    function switchTab(tab) {
      mode = tab;
      document.getElementById('tab-vendor').classList.toggle('active', tab === 'vendor');
      document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.style.display = 'none';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        // If no tenant in URL/subdomain, check the manual input field
        const manualTenant = document.getElementById('tenant-input')?.value.trim();
        const effectiveTp = tp || (manualTenant ? '?tenant=' + encodeURIComponent(manualTenant) : '');

        const res = await fetch('/api/login' + effectiveTp, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = data.redirect + (effectiveTp ? effectiveTp : '');
        } else {
          err.textContent = data.error;
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Network error';
        err.style.display = 'block';
      }
    });
  </script>
</body>
</html>
