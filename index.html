<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheFairMap - First Monday Finder</title>
  <meta name="description" content="Interactive map for First Monday Trade Days vendors and amenities.">
  <link rel="icon" type="image/png" sizes="192x192" href="/data/icons/fairmap-icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2f3d4d">
</head>
<body>
  <!-- Style controls as direct child of body for position:fixed to work -->
  <div class="style-controls" role="group" aria-label="Map style controls">
    <button id="style-venue-btn" class="map-control-btn map-style-btn is-active" type="button" aria-pressed="true">
      <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5 9 4l6 2.5L21 4v13.5L15 20l-6-2.5L3 20V6.5Zm8 10.1 2 .8V7.4l-2-.8v10Zm-6 .8 2-.8V6.6l-2 .8v10Zm14-.8v-10l-2 .8v10l2-.8Z"/></svg>
      <span>Venue Map</span>
    </button>
    <button id="style-satellite-btn" class="map-control-btn map-style-btn" type="button" aria-pressed="false">
      <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m20.7 4.7-1.4-1.4-4.2 4.2-1.1-1.1-3.8 3.8 1.1 1.1-2.4 2.4-1.6-.5-3.1 3.1 1.4 1.4 3.1-3.1-.5-1.6 2.4-2.4 1.1 1.1 3.8-3.8-1.1-1.1 4.2-4.2ZM7 18h2v2H7v-2Zm8-14h2v2h-2V4Zm3 3h2v2h-2V7Z"/></svg>
      <span>Satellite</span>
    </button>
  </div>

  <header id="mobile-topbar" aria-label="Mobile search">
    <div class="mobile-search-wrap">
      <label for="mobile-search-input" class="sr-only">Search</label>
      <input id="mobile-search-input" type="search" placeholder="Keyword" autocomplete="off">
      <span class="mobile-search-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </span>
    </div>
  </header>

  <div id="app" class="sidebar-collapsed">
    <aside id="sidebar" aria-label="Overview">
      <button id="mobile-sheet-collapse" type="button" aria-label="Collapse filters" hidden>v</button>
      <div class="sheet-handle-wrap" data-sheet-handle="sidebar" aria-hidden="true">
        <span class="sheet-handle"></span>
      </div>
      <div class="sidebar-search-wrap">
        <label for="search-input" class="sr-only">Search</label>
        <input id="search-input" type="search" placeholder="Search" autocomplete="off">
      </div>
      <button id="sidebar-filters-btn" class="sidebar-filters-btn" type="button">
        <span class="filters-glyph" aria-hidden="true">&#9776;</span>
        <span>Filters</span>
        <span id="filters-count">(0)</span>
      </button>

      <button id="overview-toggle" type="button" class="overview-toggle" aria-expanded="true">Collapse Overview</button>

      <div id="overview-list" class="overview-list" aria-live="polite"></div>
      <button id="mobile-peek-bar" type="button" aria-label="Open filters">
        <span class="mobile-peek-caret" aria-hidden="true">^</span>
      </button>
    </aside>

    <main id="map-shell">
      <div id="map-brand-overlay" class="map-brand-overlay" aria-hidden="true">
        <img src="/data/icons/first-monday-finder-logo.png" alt="First Monday Finder" class="map-brand-img">
      </div>
      <div id="map" role="application" aria-label="Map"></div>
      <div id="map-controls">
        <button id="sidebar-toggle" class="map-control-btn chevron-btn" type="button" aria-label="Open filters" aria-expanded="false">
          <span class="map-btn-glyph">&gt;</span>
        </button>
        <button id="mobile-categories-btn" class="map-control-btn mobile-categories-btn" type="button" aria-expanded="false" aria-label="Open filters">
          <span class="filters-glyph" aria-hidden="true">&#9776;</span>
          <span id="mobile-filters-label">Filters (0)</span>
        </button>
      </div>
    </main>

    <section id="detail-panel" aria-label="Location details" hidden>
      <div class="sheet-handle-wrap" data-sheet-handle="detail" aria-hidden="true">
        <span class="sheet-handle"></span>
      </div>
      <button id="detail-close" class="detail-close" type="button" aria-label="Close">&times;</button>
      <div id="detail-content" class="detail-content"></div>
    </section>

    <div id="detail-scrim" hidden></div>
    <div id="mobile-scrim" hidden></div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="config.js"></script>
  <script src="map.js"></script>

  <!-- Login Button + Embed mode -->
  <script>
    // Hide login button when embedded (?embed=1 or loaded in iframe)
    const _isEmbed = new URLSearchParams(location.search).get('embed') === '1'
      || (function() { try { return window.self !== window.top; } catch(e) { return true; } })();
    if (_isEmbed) document.documentElement.classList.add('embed-mode');
  </script>
  <style>
    .embed-mode .login-btn-wrap { display: none !important; }

    .login-btn-wrap {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 9999;
    }
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(47, 61, 77, 0.92);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .login-btn:hover { background: rgba(16, 185, 129, 0.92); transform: translateY(-1px); }
    .login-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Login Modal */
    .login-modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 99999;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
    }
    .login-modal-overlay.open { display: flex; }
    .login-modal {
      background: #fff;
      border-radius: 14px;
      padding: 36px 32px 28px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      position: relative;
    }
    .login-modal h2 { font-size: 22px; font-weight: 800; color: #1a1a2e; margin-bottom: 6px; }
    .login-modal p { font-size: 13px; color: #6b7280; margin-bottom: 24px; }
    .login-modal label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .login-modal input {
      width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
      border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none;
      box-sizing: border-box;
    }
    .login-modal input:focus { border-color: #10b981; }
    .login-modal .login-submit {
      width: 100%; padding: 12px; background: #10b981; color: #fff;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-top: 4px;
    }
    .login-modal .login-submit:hover { background: #059669; }
    .login-modal-close {
      position: absolute; top: 14px; right: 16px;
      background: none; border: none; font-size: 22px; cursor: pointer; color: #9ca3af;
      line-height: 1;
    }
    .login-error { color: #ef4444; font-size: 13px; margin-top: -10px; margin-bottom: 12px; display: none; }
    .login-loading { opacity: 0.6; pointer-events: none; }
  </style>

  <div class="login-btn-wrap">
    <button class="login-btn" onclick="document.getElementById('loginModal').classList.add('open')">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4-1.8 4-4s-1.3-4-4-4-4 1.8-4 4 1.3 4 4 4Zm0 2c-2.7 0-8 1.3-8 4v2h16v-2c0-2.7-5.3-4-8-4Z"/></svg>
      Vendor Login
    </button>
  </div>

  <div class="login-modal-overlay" id="loginModal">
    <div class="login-modal">
      <button class="login-modal-close" onclick="document.getElementById('loginModal').classList.remove('open')">&times;</button>
      <h2>Welcome back</h2>
      <p>Sign in to manage your listing or map.</p>
      <form id="loginForm" onsubmit="handleLogin(event)">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required>
        <label for="loginPass">Password</label>
        <input type="password" id="loginPass" placeholder="••••••••" required>
        <div class="login-error" id="loginError">Invalid email or password.</div>
        <button type="submit" class="login-submit">Sign In →</button>
      </form>
    </div>
  </div>

  <script>
    // Determine backend URL — works locally and on production
    const BACKEND_URL = window.location.hostname === 'thefairmap.com' || window.location.hostname.endsWith('.thefairmap.com')
      ? window.location.origin   // same origin in production (Mac mini serves everything)
      : 'http://localhost:4000'; // local dev

    async function handleLogin(e) {
      e.preventDefault();
      const form = document.getElementById('loginForm');
      const errorEl = document.getElementById('loginError');
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPass').value;
      form.classList.add('login-loading');
      errorEl.style.display = 'none';

      try {
        const res = await fetch(`${BACKEND_URL}/api/login?tenant=firstmonday`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email, password: pass, tenant: 'firstmonday' })
        });
        const data = await res.json();
        if (data.ok) {
          window.location.href = `${BACKEND_URL}${data.redirect || '/admin'}?tenant=firstmonday`;
        } else {
          errorEl.textContent = data.error || 'Invalid email or password.';
          errorEl.style.display = 'block';
        }
      } catch(err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
      }
      form.classList.remove('login-loading');
    }

    // Close modal on backdrop click
    document.getElementById('loginModal').addEventListener('click', function(e) {
      if (e.target === this) this.classList.remove('open');
    });
  </script>
</body>
</html>
